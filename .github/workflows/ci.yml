name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check extension
        run: bun run --cwd src/extension typecheck

      - name: Type-check API
        run: bun run --cwd src/api typecheck

  test:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run API tests
        run: bun run --cwd src/api test

  build-extension:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      matrix:
        include:
          - browser: chrome
            manifest: mv3
          - browser: firefox
            manifest: mv2
          - browser: edge
            manifest: mv3
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build extension (${{ matrix.browser }})
        run: bun run --cwd src/extension build -- -b ${{ matrix.browser }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: neat-stars-${{ matrix.browser }}
          path: src/extension/.output/${{ matrix.browser }}-${{ matrix.manifest }}/

  build-worker:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Worker (dry run)
        run: bun run --cwd src/api build
