name: Build Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach artifacts to (e.g. v0.1.0)'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      matrix:
        browser: [chrome, firefox, edge]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and zip extension (${{ matrix.browser }})
        run: |
          cd src/extension
          bun run wxt zip -b ${{ matrix.browser }}

      - name: Upload release artifact
        if: github.event.release.tag_name || inputs.tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.release.tag_name || inputs.tag }}"
          for f in src/extension/.output/*.zip; do
            echo "Uploading: $f"
            gh release upload "$tag" "$f" --clobber
          done
